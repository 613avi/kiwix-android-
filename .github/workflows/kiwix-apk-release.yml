name: Kiwix APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'gecko-build-*'
      - 'kiwix-build-*'
    branches:
      - 'claude/**'
    paths:
      - '.github/kiwix-release-trigger'

permissions:
  contents: write

env:
  JAVA_VERSION: 17

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Build minified standalone APKs (universal + per ABI)
        env:
          APK_BUILD: 'true'
        run: |
          ./gradlew :app:assembleStandalone
          cp app/build/outputs/apk/standalone/app-universal-standalone.apk kiwix-plus-universal.apk
          cp app/build/outputs/apk/standalone/app-armeabi-v7a-standalone.apk kiwix-plus-armeabi-v7a.apk
          cp app/build/outputs/apk/standalone/app-arm64-v8a-standalone.apk kiwix-plus-arm64-v8a.apk

      - name: Build debug APK
        run: |
          ./gradlew :app:assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk kiwix-plus-debug.apk

      - name: Build Gecko APKs (embedded Firefox engine, no WebView needed)
        run: |
          ./gradlew :app:assembleDebug -PwithGecko -PgeckoAbi=armeabi-v7a
          cp app/build/outputs/apk/debug/app-debug.apk kiwix-plus-gecko-armeabi-v7a.apk
          ./gradlew :app:assembleDebug -PwithGecko -PgeckoAbi=arm64-v8a
          cp app/build/outputs/apk/debug/app-debug.apk kiwix-plus-gecko-arm64-v8a.apk

      - name: Create GitHub release with the APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('kiwix-build-{0}', github.run_number) }}
          name: 'Kiwix+ with full text search (build ${{ github.run_number }})'
          body: |
            Kiwix+ - Kiwix Android with full text (page content) search,
            search result snippets and dpad friendly navigation.

            WebView based builds (recommended for normal devices):
            - `kiwix-plus-universal.apk` - minified release build for ALL
              devices/architectures, signed with the development key.
            - `kiwix-plus-armeabi-v7a.apk` / `kiwix-plus-arm64-v8a.apk` - the
              same, per ABI, for a smaller download.
            - `kiwix-plus-debug.apk` - debug build (all ABIs, for development).

            Gecko builds (for devices with a broken/missing WebView and no
            browser - render with an embedded Firefox engine, Android 8+):
            - `kiwix-plus-gecko-armeabi-v7a.apk` (32 bit ARM)
            - `kiwix-plus-gecko-arm64-v8a.apk` (64 bit ARM)

            Built from ${{ github.ref_name }} (${{ github.sha }}).
          files: kiwix-plus-*.apk
          target_commitish: ${{ github.sha }}
